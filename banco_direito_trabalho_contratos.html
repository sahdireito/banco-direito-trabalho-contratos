<script>
const QUESTOES = [
  {num:1, exame:"XLV Exame — 2025", titulo:"Teletrabalho de Aprendiz e Estagiário — Ambos Permitidos", enunciado:"A sociedade empresária Bons Caminhos Ltda. consultou você, como advogado(a), porque pretendia contratar, em setembro de 2025, alguns aprendizes e estagiários com 18 anos de idade para que realizassem atividades na modalidade de teletrabalho. A sociedade empresária deseja saber se tal pretensão era válida.", comando:"Em resposta à demanda da sociedade empresária, considerando os termos da CLT, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "É permitido contratar aprendizes e estagiários para realizar atividades na modalidade teletrabalho.", "B": "É permitido contratar aprendizes na modalidade teletrabalho, mas não estagiários, por desvirtuar a filosofia do estágio.", "C": "É permitido contratar estagiários na modalidade teletrabalho, mas não aprendizes, porque o contrato de trabalho deles é especial.", "D": "Somente é permitido contratar aprendizes e estagiários em regime de teletrabalho se houver autorização dos seus pais ou responsáveis."}, fb:{"A": "Correta! Art. 75-B, §6º, CLT (incluído pela Lei 14.442/2022): 'Fica permitido o teletrabalho para estagiários e aprendizes.' A lei resolve a questão de forma literal — ambos podem trabalhar em teletrabalho, sem distinção.", "B": "Incorreta. A CLT permite teletrabalho para AMBOS — aprendizes e estagiários. Não existe vedação para estagiários em teletrabalho.", "C": "Incorreta. A CLT também permite teletrabalho para aprendizes. O fato de o contrato de aprendizagem ser especial não impede a modalidade de teletrabalho.", "D": "Incorreta. Os candidatos têm 18 anos — já são maiores e plenamente capazes. Além disso, a CLT não condiciona o teletrabalho de aprendizes e estagiários a autorização dos pais. Essa informação da idade foi colocada como distrator."}, fund:"Art. 75-B, §6º, CLT (Lei 14.442/2022): fica permitido o teletrabalho para estagiários e aprendizes. Não há restrição etária adicional nem exigência de autorização parental para essa modalidade.", caqui:"A FGV armou duas ciladas aqui: (1) tentou separar aprendiz de estagiário, como se um pudesse e outro não — mas a lei autoriza os DOIS. (2) colocou a idade de 18 anos para te fazer pensar em autorização dos pais — mas eles já são maiores e a lei não exige isso de qualquer forma. Mnemônico: 'No teletrabalho da CLT, o aprendiz entra e o estagiário também.'"},
  {num:2, exame:"XLIII Exame — 2025", titulo:"Anotação da CTPS — Obrigação Irrenunciável em 5 Dias Úteis", enunciado:"Sérgio foi contratado, em 2022, por uma indústria mecânica para receber um salário mensal de R$ 3.000,00. Ele pediu para não ter a CTPS assinada, porque estava recebendo o seguro-desemprego do emprego anterior. Também não queria ter contracheque formal para que a ex-esposa não soubesse do novo emprego, pois estava devendo pensão alimentícia. A sociedade empresária cedeu aos seus argumentos e não assinou sua carteira profissional.", comando:"Sobre a decisão da sociedade empresária, considerando o que dispõe a CLT, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "Ela não precisa assinar a CTPS, desde que isso esteja previsto em norma coletiva.", "B": "Ela agiu incorretamente, porque deveria anotar o contrato de trabalho na CTPS no prazo de cinco dias úteis.", "C": "Ela está equivocada, pois a anotação da CTPS é direito irrenunciável e deve ser feita em 15 (quinze) dias corridos.", "D": "Ela agiu corretamente, porque essa era a vontade livre manifestada pelo empregado e, atualmente, o negociado suplanta o legislado."}, fb:{"A": "Incorreta. A obrigação de anotar a CTPS é legal e não pode ser afastada por norma coletiva. Não existe essa possibilidade no ordenamento trabalhista.", "B": "Correta! Art. 29 CLT: o empregador deve anotar a CTPS do empregado no prazo de 5 DIAS ÚTEIS. A anotação é obrigação legal do empregador — independe da vontade do empregado. O pedido de Sérgio é irrelevante juridicamente.", "C": "Incorreta. O raciocínio está na direção certa (é irrenunciável), mas o PRAZO está errado. A CLT fala em 5 DIAS ÚTEIS, não 15 dias corridos. A banca trocou o prazo para derrubar quem memorizou o conceito mas errou o número.", "D": "Incorreta. A vontade do empregado e o princípio 'negociado sobre legislado' não valem aqui. Registro em CTPS é dever inafastável do empregador — não é matéria disponível para ajuste individual."}, fund:"Art. 29 CLT: a CTPS deve ser anotada pelo empregador no prazo de 5 DIAS ÚTEIS quanto à data de admissão, remuneração e condições especiais. Trata-se de obrigação legal irrenunciável — a vontade do empregado não afasta o dever do empregador.", caqui:"A FGV montou uma história sedutora: empregado querendo esconder renda, empresa 'ajudando'. Mas em DT a intenção das partes não sobrepõe a lei. O empregador assina a CTPS mesmo que o empregado implore para não assinar. Decore o prazo: 5 DIAS ÚTEIS (não dias corridos, não dias úteis, não semana). A alternativa C quase acerta mas troca '5 dias úteis' por '15 dias corridos' — pegadinha clássica de prazo."},
  {num:3, exame:"XLII Exame — 2024", titulo:"Salário In Natura — O Que Integra e o Que Não Integra a Remuneração", enunciado:"Geraldo trabalha desde 2022 para uma sociedade empresária, recebe salário fixo de R$ 4.000,00 e desfruta de um pacote de benefícios que inclui: auxílio-alimentação em forma de ticket; habitação num luxuoso apartamento; plano de saúde; auxílio-educação (compreendendo matrícula, mensalidade, anuidade, livros e material didático).", comando:"De acordo com os dados do enunciado e com o texto da CLT, assinale a afirmativa correta sobre quais benefícios devem ter seu valor integrado à remuneração.", gabarito:"C", alt:{"A": "Apenas a educação integrará a remuneração.", "B": "Apenas o valor do plano de saúde não integrará a remuneração.", "C": "Apenas habitação, fornecida pelo trabalho, integrará a remuneração.", "D": "Alimentação, habitação, plano de saúde e auxílio-educação integrarão a remuneração."}, fb:{"A": "Incorreta. Auxílio-educação NÃO integra a remuneração — o art. 458, §2º, CLT afasta expressamente a natureza salarial dos valores relativos à educação (matrícula, mensalidade, livros, material didático).", "B": "Incorreta. Não é só o plano de saúde que fica de fora. Também não integram: ticket alimentação e auxílio-educação. A alternativa deixa de excluir os outros dois.", "C": "Correta! Análise item a item: TICKET ALIMENTAÇÃO → não integra (art. 457 e 458 CLT). HABITAÇÃO → INTEGRA como salário-utilidade (art. 458 caput CLT). PLANO DE SAÚDE → não integra (art. 458, §2º CLT: 'assistência médica, hospitalar e odontológica'). AUXÍLIO-EDUCAÇÃO → não integra (art. 458, §2º CLT: matrícula, mensalidade, livros, material didático).", "D": "Incorreta. Apenas a habitação integra. A banca colocou os quatro para ver se o candidato marcaria tudo."}, fund:"Art. 458 CLT: o salário-utilidade abrange alimentação, habitação e outras prestações in natura fornecidas habitualmente. Art. 458, §2º: NÃO têm natureza salarial: assistência médica/odontológica, educação (matrícula, mensalidade, livros, material didático), entre outros. Ticket/vale alimentação: também não integra.", caqui:"Macete para memorizar o que ENTRA e o que FICA DE FORA do salário in natura: ENTRA = habitação (casa fornecida pela empresa → salário-utilidade). FICA DE FORA = saúde, educação, ticket alimentação. Frase-macete: 'Casa entra; saúde, estudo e ticket ficam fora.' A FGV adora essa questão porque mistura quatro parcelas comuns e o candidato que não conhece o art. 458 §2º marca tudo como salário."},
  {num:4, exame:"XLI Exame — 2024", titulo:"Conceito Legal de Teletrabalho — Art. 75-B CLT", enunciado:"Antônio Valente quer passar a exercer suas atividades em teletrabalho, mas sem saber exatamente o que configuraria essa modalidade. Antes de se candidatar à vaga, Antônio resolveu consultar você a respeito do tema.", comando:"Assinale a opção que apresenta, corretamente, sua orientação.", gabarito:"D", alt:{"A": "O teletrabalho pode ser pactuado, tácita ou expressamente, entre empregado e empregador, não necessitando constar do instrumento individual de contrato de trabalho.", "B": "O trabalho em regime de teletrabalho não pressupõe a prestação dos serviços por jornada, por produção ou por tarefa.", "C": "O teletrabalho será descaracterizado, caso o empregado, habitualmente, tenha que comparecer às dependências do empregador e o empregado retornará ao sistema de trabalho presencial.", "D": "O teletrabalho se dá, total ou parcialmente, fora das dependências do empregador, não se configurando como trabalho externo, pressupondo a utilização de tecnologias de comunicação e informação."}, fb:{"A": "Incorreta. A CLT exige que a prestação de serviços em teletrabalho conste EXPRESSAMENTE do instrumento individual de contrato. Ajuste tácito não basta.", "B": "Incorreta. O teletrabalho pode ocorrer tanto por jornada quanto por produção ou por tarefa. A alternativa negou justamente algo que a lei admite.", "C": "Incorreta. O comparecimento às dependências do empregador, ainda que habitual para atividades específicas, NÃO descaracteriza o teletrabalho (art. 75-B, §1º CLT). A alternativa inverteu a regra.", "D": "Correta! Art. 75-B CLT: teletrabalho é a prestação de serviços FORA das dependências do empregador, de maneira TOTAL OU PARCIAL, com uso de TECNOLOGIAS DE INFORMAÇÃO E COMUNICAÇÃO, sem se configurar como trabalho externo."}, fund:"Art. 75-B CLT: considera-se teletrabalho ou trabalho remoto a prestação de serviços fora das dependências do empregador, de maneira preponderante ou não, com a utilização de tecnologias de informação e de comunicação, que por sua natureza não se configure como trabalho externo. Art. 75-B, §1º: o comparecimento às dependências do empregador para atividades específicas não descaracteriza o teletrabalho.", caqui:"Quatro ideias do teletrabalho para fixar: (1) FORA da empresa = total ou parcial; (2) usa TECNOLOGIA de informação; (3) NÃO é trabalho externo (motorista, vendedor externo); (4) CONTRATO EXPRESSO (não tácito). A FGV testou as quatro numa questão só. Se cair na prova, pense: 'Teletrabalho é trabalho com tecnologia, fora da empresa, sem virar trabalho externo.'"},
  {num:5, exame:"XLI Exame — 2024", titulo:"Ação Penal Contra Empregado — Sem Consequência Automática no Contrato", enunciado:"Constantino é empregado em uma indústria de fabricação de móveis. O empregador ficou ciente de que o MP apresentou denúncia contra Constantino pela prática de fato típico, antijurídico e culpável, praticado durante uma assembleia de condomínio, contra um morador do mesmo prédio. A denúncia foi recebida pelo juiz criminal e o processo penal teve início.", comando:"De acordo com a legislação em vigor, assinale a afirmativa que corretamente apresenta os efeitos jurídicos dessa situação no contrato de trabalho.", gabarito:"C", alt:{"A": "O contrato de trabalho de Constantino ficará suspenso pelo recebimento da denúncia.", "B": "O recebimento da denúncia é falta grave que automaticamente ensejará a extinção do contrato por justa causa.", "C": "Nenhuma consequência haverá no contrato de trabalho, porque a presunção é de inocência.", "D": "O contrato de trabalho ficará interrompido e Constantino será considerado licenciado até o término da ação penal."}, fb:{"A": "Incorreta. A CLT não prevê suspensão contratual automática pelo simples recebimento de denúncia criminal. Receber denúncia ≠ suspender contrato.", "B": "Incorreta. O recebimento de denúncia não é justa causa automática. Justa causa exige enquadramento em hipótese legal e, além disso, o fato ocorreu na esfera privada do empregado — fora do ambiente de trabalho.", "C": "Correta! O simples recebimento de denúncia criminal, por si só, não gera nenhuma consequência automática no contrato de trabalho. Não há suspensão, interrupção nem justa causa automática. O processo penal e o contrato de trabalho correm em esferas distintas.", "D": "Incorreta. A CLT não prevê interrupção automática do contrato nem licença obrigatória pelo mero andamento de ação penal."}, fund:"CLT: as hipóteses de suspensão e interrupção do contrato de trabalho são taxativas. O simples recebimento de denúncia criminal não integra nenhuma delas. Presunção de inocência (CF art. 5º, LVII). O fato ocorreu fora do ambiente laboral, sem reflexo direto imediato no contrato.", caqui:"A FGV usou linguagem técnica pesada — 'fato típico, antijurídico e culpável', 'denúncia recebida', 'processo penal iniciado' — para te fazer pensar que algo grave aconteceu com consequência automática. Mas denúncia ≠ condenação. E processo penal em curso, sozinho, não mexe automaticamente no contrato. Frase-macete: 'Denúncia não demite, não suspende e não interrompe.'"},
  {num:6, exame:"XLI Exame — 2024", titulo:"Serviço Militar e Acidente de Trabalho — Tempo Conta para Indenização", enunciado:"Pedro e Vitor trabalham na mesma sociedade empresária. Em 2023: Pedro foi convocado para prestar serviço militar obrigatório; Vitor sofreu grave acidente de trabalho, que exigiu seu afastamento do emprego por um ano.", comando:"Sobre o tempo de serviço dos dois empregados, considerando os fatos narrados e o que dispõe a CLT, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "Ambos os empregados terão computado o tempo de afastamento na contagem de tempo de serviço para efeito de indenização.", "B": "Somente Pedro terá computado o tempo de serviço militar na contagem de tempo de serviço para efeito de indenização.", "C": "Nenhum dos empregados terá computado o tempo de afastamento na contagem de tempo de serviço para efeito de indenização.", "D": "Apenas Vitor terá computado o tempo de serviço militar na contagem de tempo de serviço para efeito de indenização."}, fb:{"A": "Correta! Art. 4º, parágrafo único, CLT: são computados como tempo de serviço, para efeito de indenização, os períodos de afastamento por SERVIÇO MILITAR OBRIGATÓRIO e por ACIDENTE DE TRABALHO. Ambas as situações de Pedro e Vitor estão expressamente previstas.", "B": "Incorreta. Vitor também tem o período computado — o afastamento por acidente de trabalho conta para indenização, igual ao serviço militar.", "C": "Incorreta. A CLT é expressa em incluir os dois afastamentos na contagem. O contrato fica suspenso, mas o tempo conta para fins de indenização.", "D": "Incorreta. Além de errar o nome (Vitor não fez serviço militar, Pedro sim), a alternativa exclui quem também deveria ter o tempo computado."}, fund:"Art. 4º, parágrafo único, CLT: serão computados como tempo de serviço, para efeito de indenização: I — os períodos de afastamento por serviço militar obrigatório; II — os períodos de afastamento por acidente de trabalho.", caqui:"Armadilha clássica de DT: confundir 'contrato suspenso' com 'tempo não conta'. No serviço militar e no acidente de trabalho, o contrato fica suspenso MAS o tempo continua contando para indenização. Mnemônico: 'Serviço militar e acidente contam para indenização.' A alternativa D tem dois erros: troca o nome dos empregados E ainda exclui o outro."},
  {num:7, exame:"XL Exame — 2024", titulo:"Trabalho Temporário — Cláusula de Reserva é Nula de Pleno Direito", enunciado:"A empresa de trabalho temporário Sempre Alerta Ltda. terceirizará o serviço de limpeza da sociedade empresária Extintores Infalíveis Ltda., nela alocando 10 auxiliares de limpeza. No contrato, que vigora por 180 dias e é regido pela Lei nº 6.019/74, existe cláusula de reserva que proíbe a contratação de qualquer auxiliar pela empresa tomadora ao fim do prazo em que ele tenha sido colocado à sua disposição.", comando:"Considerando os fatos e a norma de regência, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "A cláusula de reserva é válida, se ambas as partes a aceitarem.", "B": "Para a validade da cláusula de reserva, é necessária a chancela do sindicato de classe dos empregadores.", "C": "A inserção da cláusula de reserva é possível, desde que prevista em acordo coletivo de trabalho.", "D": "A cláusula de reserva é nula de pleno direito."}, fb:{"A": "Incorreta. A vontade das partes não salva uma cláusula declarada nula por lei. Quando a lei fala 'nula de pleno direito', não importa se ambos concordaram.", "B": "Incorreta. Chancela sindical não convalida a nulidade. A lei não abre essa exceção.", "C": "Incorreta. Nem norma coletiva salva essa cláusula. O art. 11 da Lei 6.019/74 é absoluto: a cláusula é nula.", "D": "Correta! Art. 11, Lei 6.019/74: é nula de pleno direito qualquer cláusula que proíba ou restrinja a contratação do trabalhador temporário pela empresa tomadora ao final do período em que foi colocado à sua disposição."}, fund:"Art. 11, Lei 6.019/74: é nula de pleno direito qualquer cláusula que proíba ou restrinja a contratação do trabalhador temporário pela empresa tomadora ou cliente ao final do período em que foi colocado à sua disposição.", caqui:"A cláusula de reserva tenta 'prender' o trabalhador temporário à empresa intermediadora, impedindo que a tomadora o contrate depois. A lei joga isso no lixo. Não importa: se as duas empresas concordaram, se tem sindicato, se tem ACT — cláusula nula de pleno direito. Frase-macete: 'Terminou o temporário? A tomadora pode contratar. Se o contrato proibir, a cláusula cai.'"},
  {num:8, exame:"XXXVI Exame — 2022", titulo:"Sucessão Trabalhista — Sucessor Responde Inclusive Pelo Passivo Anterior", enunciado:"A sociedade empresária Mangiare Bene, do ramo de serviços de alimentação, tem um plano de expansão em que pretende assumir as atividades de outros restaurantes, passando a deter a maioria do capital social destes. Preocupada com os contratos de trabalho dos futuros empregados, ela consulta você, na condição de advogado(a).", comando:"Em relação à consulta feita, considerando a CLT em vigor, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "A mudança na propriedade ou na estrutura jurídica da sociedade não afetará os contratos de trabalho dos respectivos empregados, mas, em caso de sucessão de empregadores, as obrigações trabalhistas, inclusive as contraídas à época em que os empregados trabalhavam para a empresa sucedida, são de responsabilidade do sucessor.", "B": "A mudança na propriedade ou na estrutura jurídica da empresa não afetará os contratos de trabalho, mas as obrigações trabalhistas anteriores à sucessão serão de responsabilidade da empresa sucedida e as posteriores do sucessor.", "C": "Em caso de comprovação de fraude na sucessão de empregadores, a empresa sucessora responde como devedora principal, e a sucedida responderá subsidiariamente.", "D": "Em caso de sucessão trabalhista, esta implicará novação dos contratos de trabalho, de modo que poderão ocorrer alterações contratuais pelo atual empregador, respeitado apenas o tempo de serviço."}, fb:{"A": "Correta! Arts. 10, 448 e 448-A CLT: a mudança na estrutura jurídica não afeta os contratos. Na sucessão trabalhista, o SUCESSOR responde pelas obrigações trabalhistas, inclusive as contraídas antes da sucessão — não há divisão de passivo entre sucedida e sucessora como regra geral.", "B": "Incorreta. A CLT (art. 448-A) é expressa: o sucessor responde INCLUSIVE pelas obrigações anteriores. Não existe essa divisão 'antes = sucedida / depois = sucessor'.", "C": "Incorreta. Na fraude, a responsabilidade é SOLIDÁRIA (sucedida e sucessora respondem juntas), não subsidiária.", "D": "Incorreta. Sucessão trabalhista NÃO gera novação do contrato. O contrato continua, preservando todos os direitos adquiridos e o tempo de serviço."}, fund:"Art. 10 CLT: alteração na estrutura jurídica não afeta direitos dos empregados. Art. 448 CLT: mudança na propriedade não afeta contratos. Art. 448-A CLT: na sucessão, o sucessor responde pelas obrigações trabalhistas inclusive as anteriores. Na fraude: responsabilidade solidária.", caqui:"Três regras da sucessão trabalhista: (1) contrato continua — mudou o dono, não muda o contrato; (2) sucessor leva o passivo TODO, inclusive o de antes; (3) fraude = solidariedade (não subsidiariedade). A FGV adora a pegadinha 'dívida antiga fica com a empresa antiga' — errado, o sucessor herda tudo. Frase-macete: 'Mudou o dono, não muda o contrato; mudou a empresa, o sucessor leva o passivo.'"},
  {num:9, exame:"XXXVI Exame — 2022", titulo:"Dano Pré-Contratual — Competência da Justiça do Trabalho", enunciado:"João da Silva foi selecionado para vaga em um banco privado e recebeu e-mail formal de aprovação com convocação para apresentação com documentos. Por causa disso, recusou participação em outros dois processos seletivos. No dia em que se apresentou, o gerente de RH disse ter havido engano — o aprovado era um homônimo.", comando:"Diante dos fatos narrados e das normas de regência, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Nada há a fazer, pois a empresa se justificou, pediu desculpas e não houve prejuízo a João da Silva.", "B": "O banco deverá ser obrigado a contratar João da Silva, em razão da promessa constante do e-mail.", "C": "A situação envolve dano pré-contratual, de competência da Justiça do Trabalho.", "D": "Uma vez que não houve contrato formalizado, a eventual responsabilidade civil deverá ser analisada pela Justiça Comum."}, fb:{"A": "Incorreta. Houve prejuízo concreto: João recusou outros processos seletivos e reorganizou sua vida com base na informação do banco. Pedido de desculpas não afasta responsabilidade civil.", "B": "Incorreta. A solução jurídica não é obrigar a contratação, mas reparar os danos causados pela frustração injustificada da legítima expectativa de emprego.", "C": "Correta! Há dano pré-contratual — o banco criou expectativa concreta de contratação (e-mail formal, convocação com documentos) e frustrou sem justificativa adequada. A JT tem competência para julgar controvérsias decorrentes da relação de trabalho, inclusive na fase pré-contratual.", "D": "Incorreta. A ausência de contrato assinado não desloca a competência para a Justiça Comum. A JT julga litígios decorrentes da fase pré-contratual da relação de trabalho."}, fund:"Dano pré-contratual: fundado na boa-fé objetiva e responsabilidade civil nas tratativas. A JT tem competência para apreciar controvérsias decorrentes da relação de trabalho, inclusive na fase que a precede. A promessa séria de contratação, seguida de frustração injustificada com prejuízo ao candidato, gera responsabilidade pré-contratual.", caqui:"A FGV usou a armadilha: 'Se não tem contrato assinado, a Justiça Comum julga.' ERRADO. A JT não precisa de contrato assinado para ter competência — ela julga conflitos ligados à relação de trabalho, inclusive antes do contrato nascer. Dano pré-contratual = fase das tratativas + violação da boa-fé + prejuízo concreto = JT julga. Frase-macete: 'Prometeu emprego, criou confiança e frustrou sem justificativa? É dano pré-contratual e vai para a JT.'"},
  {num:10, exame:"XXXV Exame — 2022", titulo:"Contrato Intermitente — Prazo de Convocação e Resposta", enunciado:"A churrascaria Boi Gordo tem movimento variado ao longo dos meses e decidiu contratar alguns empregados por meio do contrato intermitente. Os pretensos empregados consultaram você, como advogado(a), para esclarecer algumas dúvidas.", comando:"Assinale a opção que indica, corretamente, o esclarecimento prestado.", gabarito:"A", alt:{"A": "O tempo de resposta do empregado em relação à convocação para algum trabalho é de um dia útil para responder ao chamado, e o silêncio gera presunção de recusa.", "B": "O empregador poderá convocar o empregado de um dia para o outro, sendo a antecedência de um dia útil.", "C": "Para o empregado existe um limite de recusas por mês. Extrapolado o número de três recusas no mês, considerar-se-á rompido o contrato.", "D": "O contrato intermitente pode ser tácito ou expresso, verbal ou escrito."}, fb:{"A": "Correta! Art. 452-A, §2º CLT: recebida a convocação, o empregado terá 1 DIA ÚTIL para responder. O silêncio presume recusa. Esse é o prazo de RESPOSTA do empregado.", "B": "Incorreta. Confundiu os prazos. O prazo de CONVOCAÇÃO pelo empregador é de 3 DIAS CORRIDOS de antecedência (não 1 dia útil). O prazo de 1 dia útil é do empregado para RESPONDER.", "C": "Incorreta. A CLT não estabelece limite mensal de recusas. A recusa não rompe automaticamente o contrato intermitente.", "D": "Incorreta. O contrato intermitente deve ser CELEBRADO POR ESCRITO (art. 452-A CLT). Não pode ser tácito nem apenas verbal."}, fund:"Art. 452-A CLT: o empregador convoca com pelo menos 3 DIAS CORRIDOS de antecedência. §2º: o empregado tem 1 DIA ÚTIL para responder; o silêncio presume recusa.", caqui:"No intermitente, a FGV SEMPRE tenta trocar os dois prazos: empregador convoca com 3 DIAS CORRIDOS; empregado responde em 1 DIA ÚTIL. São prazos diferentes, para partes diferentes. Regra do 3 e 1: '3 corridos para chamar, 1 útil para responder.' Silêncio = recusa presumida. Sem limite de recusas por mês. Contrato obrigatoriamente escrito."},
  {num:11, exame:"XXXV Exame — 2022", titulo:"Invenções do Empregado — Propriedade Comum Quando Há Uso de Recursos do Empregador", enunciado:"Paulo Sampaio foi chamado para entrevista de emprego em empresa de tecnologia. Sabendo que, se contratado, desenvolverá projetos de aplicativos para smartphones, dentre outras invenções, resolveu consultar você sobre a propriedade intelectual sobre tais invenções, sendo certo que não foi tratada nenhuma condição contratual até agora.", comando:"Diante disso, de acordo com a redação da CLT em vigor, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "Na qualidade de empregado, toda a propriedade sobre as invenções será do empregador.", "B": "No curso do contrato de trabalho, as invenções realizadas pessoalmente pelo empregado, mas com utilização de equipamentos fornecidos pelo empregador, serão de propriedade comum, em partes iguais, salvo se o contrato de trabalho tiver por objeto pesquisa científica.", "C": "O empregador poderá explorar a invenção a qualquer tempo sem limitação de prazo após a concessão da patente, uma vez que se trata de contrato de trabalho.", "D": "A propriedade do invento deverá ser dividida proporcionalmente após a apuração da contribuição do empregado e o investimento em equipamentos feito pelo empregador."}, fb:{"A": "Incorreta. Nem toda invenção do empregado pertence ao empregador. Depende de como o invento foi feito: se decorre diretamente do contrato ou se o empregado usou recursos próprios.", "B": "Correta! Quando a invenção é pessoal do empregado mas feita com uso de equipamentos/recursos do empregador, temos propriedade COMUM em partes iguais (art. 91 Lei 9.279/96 c/c art. 591 CC — presunção de cotas iguais na ausência de convenção). ⚠️ Nota: o fundamento real é a Lei de Propriedade Industrial (Lei 9.279/96), não exatamente a CLT como a questão sugere.", "C": "Incorreta. A alternativa inventa regra inexistente de exploração irrestrita pelo empregador.", "D": "Incorreta. A lei não adota divisão proporcional 'caso a caso'. A regra para invenção mista é propriedade COMUM em partes IGUAIS (salvo convenção)."}, fund:"Lei 9.279/96 (LPI): art. 88 — invenção feita com recursos do empregador = pertence ao empregador. Art. 90 — invenção pessoal sem recursos do empregador = pertence ao empregado. Art. 91 — invenção pessoal MAS com recursos do empregador = propriedade COMUM. Art. 591 CC (aplicável por analogia): presunção de cotas iguais.", caqui:"Três cenários de invenção do empregado: (1) CONTRATADO PARA INVENTAR = invenção pertence ao empregador. (2) INVENTO PESSOAL SEM RECURSOS DO EMPREGADOR = pertence ao empregado. (3) INVENTO PESSOAL + EQUIPAMENTO DO EMPREGADOR = MEIO A MEIO (propriedade comum). A questão pede exatamente o cenário 3. Mnemônico: 'Invento do empregado com máquina do patrão = meio a meio.'"},
  {num:12, exame:"XXXV Exame — 2022", titulo:"Exame Toxicológico na Admissão — Motorista Profissional x Despachante", enunciado:"A sociedade empresária Transportes Canela Ltda. abriu processo seletivo para motoristas profissionais e despachantes. Sérgio se apresentou para motorista e Bárbara para despachante. A empresa exigiu de ambos realização de exame toxicológico como condição para admissão.", comando:"Considerando a situação de fato e a previsão legal, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Em hipótese alguma, o exame poderia ser feito, uma vez que viola a intimidade dos trabalhadores.", "B": "O exame pode ser feito em ambos os empregados, desde que haja prévia autorização judicial.", "C": "O exame seria válido para Sérgio por expressa previsão legal, mas seria ilegal para Bárbara.", "D": "É possível o exame em Bárbara se houver fundada desconfiança da empresa, mas, para Sérgio, não pode ser realizado."}, fb:{"A": "Incorreta. Para motorista profissional há previsão legal expressa autorizando o exame toxicológico na admissão.", "B": "Incorreta. Não existe exigência de autorização judicial para o exame do motorista profissional. Essa hipótese foi inventada.", "C": "Correta! A CLT prevê expressamente a possibilidade de exame toxicológico para o MOTORISTA PROFISSIONAL em momentos específicos (admissão, desligamento). Para a despachante (Bárbara), não existe previsão legal equivalente — a exigência é ilegal.", "D": "Incorreta. Inverteu completamente: para Sérgio (motorista) o exame é VÁLIDO por previsão legal; para Bárbara (despachante) é INVÁLIDO."}, fund:"CLT (disposições sobre motorista profissional): exame toxicológico admitido expressamente para motorista profissional na admissão e no desligamento. Para cargos sem previsão legal específica, a exigência de exame toxicológico na admissão não encontra amparo e pode violar a intimidade do trabalhador.", caqui:"A pegadinha está em misturar dois candidatos no mesmo enunciado: um com previsão legal (motorista) e outro sem (despachante). A exigência de toxicológico não é livre para qualquer função — existe quando a lei especificamente autoriza. Motorista profissional = lei prevê. Despachante = lei não prevê = exigência ilegal. Frase-macete: 'Toxicológico na admissão? Para motorista profissional, sim; para o resto, não.'"},
  {num:13, exame:"XXXIV Exame — 2022", titulo:"Regime de Trabalho em Tempo Parcial — Duas Modalidades Previstas na CLT", enunciado:"Determinada sociedade empresária propôs a candidatos a emprego dois tipos de contrato: (1) duração máxima de 30 horas semanais, sem possibilidade de horas extras; ou (2) como alternativa, duração de 26 horas semanais, com possibilidade de no máximo 6 horas extras semanais.", comando:"Assinale a opção que apresenta, corretamente, sua resposta sobre os contratos oferecidos.", gabarito:"A", alt:{"A": "Os dois casos apresentam contratos de trabalho em regime de tempo parcial.", "B": "No primeiro caso, trata-se de contrato em regime de tempo parcial; no segundo, trata-se de contrato comum, haja vista a impossibilidade de horas extras nessa modalidade contratual.", "C": "Os dois casos não são contratos em regime de tempo parcial, já que o primeiro excede o tempo total de horas semanais e, o segundo, contém horas extras, o que não é cabível.", "D": "Não se trata de contrato por tempo parcial, pois, na hipótese, admite-se tempo inferior ao limite máximo, quando na modalidade de regime por tempo parcial os contratos só poderão ter 30 ou 26 horas."}, fb:{"A": "Correta! Art. 58-A CLT prevê DUAS modalidades de tempo parcial: (1) até 30 horas semanais, sem horas suplementares; OU (2) até 26 horas semanais, com possibilidade de até 6 horas suplementares semanais. Ambos os contratos do enunciado se encaixam exatamente nessas hipóteses.", "B": "Incorreta. Cabem sim horas extras no tempo parcial — mas apenas na modalidade de até 26h semanais, com limite de 6h extras. A alternativa ignora justamente a segunda modalidade.", "C": "Incorreta. Nenhum dos contratos excede o limite. 30h ≤ 30h (correto). 26h + até 6 extras = permitido pela CLT.", "D": "Incorreta. A lei diz 'até 30h' e 'até 26h' — o contrato pode ter MENOS do que esses valores. Não precisa ser exatamente 30 ou 26h."}, fund:"Art. 58-A CLT: trabalho em tempo parcial = jornada de até 30h semanais sem horas extras, OU de até 26h semanais com possibilidade de até 6h suplementares por semana.", caqui:"A FGV adora essa questão porque muita gente memoriza só uma modalidade e esquece que existem DUAS portas para o tempo parcial. Macete: '30 sem extra ou 26 com até 6 extras.' Cuidado com a alternativa D que diz que só pode ser exatamente 30 ou 26h — mentira, pode ser menos (até 30h = qualquer coisa abaixo de 30h)."},
  {num:14, exame:"XXXIV Exame — 2022", titulo:"Teletrabalho — Equipamentos Fornecidos Não Integram a Remuneração", enunciado:"Júlia é analista de sistemas de uma empresa de tecnologia e solicitou ao empregador trabalhar remotamente.", comando:"Sobre a pretensão de Júlia, observados os termos da CLT, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "O teletrabalho só pode ser assim considerado se a prestação de serviços for totalmente fora das dependências da empresa.", "B": "O ajuste entre Júlia e seu empregador poderá ser tácito, assim como ocorre com o próprio contrato de trabalho.", "C": "O computador e demais utilidades que se fizerem necessárias para o trabalho remoto de Júlia não integrarão sua remuneração.", "D": "O ajuste entre as partes para o trabalho remoto deverá ser por mútuo consentimento, assim como o retorno ao trabalho presencial."}, fb:{"A": "Incorreta. O teletrabalho pode ser TOTAL OU PARCIALMENTE fora da empresa. O comparecimento eventual ou habitual para atividades específicas não o descaracteriza.", "B": "Incorreta. A CLT exige que a prestação em teletrabalho conste EXPRESSAMENTE do contrato. Ajuste tácito não é admitido.", "C": "Correta! Art. 75-D, parágrafo único, CLT: os equipamentos, infraestrutura e utilidades fornecidos pelo empregador para a prestação do teletrabalho não integram a remuneração do empregado. São instrumentos de trabalho, não salário-utilidade.", "D": "Incorreta. A segunda parte está errada: o RETORNO ao trabalho presencial pode ser determinado pelo empregador com prazo mínimo de transição — não depende necessariamente de mútuo consentimento."}, fund:"Art. 75-D CLT: as disposições sobre responsabilidade pela aquisição e fornecimento de equipamentos e infraestrutura serão previstas em contrato. Parágrafo único: os equipamentos fornecidos pelo empregador para o teletrabalho não integram a remuneração do empregado.", caqui:"Quatro regras do teletrabalho que a FGV testou aqui: (1) não precisa ser 100% remoto; (2) não pode ser ajuste tácito; (3) equipamentos NÃO são salário; (4) retorno ao presencial não precisa de mútuo acordo. A mais importante para a prova: 'Notebook do home office não vira salário.'"},
  {num:15, exame:"XXXII Exame — 2021", titulo:"Teletrabalho — Responsabilidade pelas Despesas Deve Ser Prevista em Contrato Escrito", enunciado:"Luiz e Selma são casados e trabalham para o mesmo empregador como teletrabalhadores. O empregador montou um home office no apartamento do casal. Para a impressão dos dados que serão objeto de análise, o casal necessitará de resmas de papel e toner para a impressora.", comando:"Assinale a opção que indica quem deverá arcar com esses gastos, de acordo com a CLT.", gabarito:"C", alt:{"A": "Cada parte deverá arcar com 50% desse gasto.", "B": "A empresa deverá arcar com o gasto porque é seu o risco do negócio.", "C": "A responsabilidade por esse gasto deverá ser prevista em contrato escrito.", "D": "O casal deverá arcar com o gasto, pois não há como o empregador fiscalizar se o material será utilizado apenas no trabalho."}, fb:{"A": "Incorreta. A CLT não estabelece divisão 50/50 como regra automática. A responsabilidade deve ser definida em contrato.", "B": "Incorreta. Embora a lógica do risco do negócio exista no direito do trabalho, não é uma regra automática aqui. A CLT manda o assunto ser definido contratualmente.", "C": "Correta! Art. 75-D CLT: as disposições relativas à responsabilidade pela aquisição, manutenção ou fornecimento dos equipamentos e infraestrutura necessária à prestação do teletrabalho, bem como ao reembolso de despesas arcadas pelo empregado, SERÃO PREVISTAS EM CONTRATO ESCRITO.", "D": "Incorreta. O fato de não haver fiscalização não é critério legal para definir quem paga. A CLT determina que o assunto seja tratado em contrato."}, fund:"Art. 75-D CLT: as disposições relativas à responsabilidade pela aquisição, manutenção ou fornecimento dos equipamentos tecnológicos e da infraestrutura necessária e adequada à prestação do trabalho remoto, bem como ao reembolso de despesas, serão previstas em contrato escrito.", caqui:"Pergunta simples, resposta direta: quem paga os materiais do home office? DEPENDE DO CONTRATO. A CLT não presume nem 50/50, nem que é a empresa, nem que é o empregado. Ela manda as partes colocarem isso no contrato escrito. Se não foi colocado no contrato, há omissão contratual — e a lei manda resolver isso no instrumento escrito. Frase-macete: 'No teletrabalho, despesas = resolve no contrato escrito.'"},
  {num:16, exame:"XXXII Exame — 2021", titulo:"Trabalho Temporário — Falência da ETT Gera Responsabilidade Solidária da Tomadora", enunciado:"Uma indústria de chocolates contratou vários trabalhadores temporários pelo prazo de 30 dias por meio de uma empresa de trabalho temporário. Maria era uma dessas trabalhadoras. A empresa de trabalho temporário teve a falência decretada e não pagou nada aos trabalhadores temporários.", comando:"Assinale a opção que indica a responsabilidade da indústria de chocolates.", gabarito:"A", alt:{"A": "A indústria de chocolates contratante terá responsabilidade solidária.", "B": "Não haverá qualquer tipo de responsabilidade da contratante, porque a terceirização foi lícita.", "C": "A contratante se tornará empregadora dos trabalhadores temporários em razão da falência da empresa contratada.", "D": "A indústria de chocolates contratante terá responsabilidade subsidiária se isso estiver previsto no contrato com a prestadora."}, fb:{"A": "Correta! Lei 6.019/74: na falência da empresa de trabalho temporário, a empresa tomadora/clientes responde SOLIDARIAMENTE pelas obrigações trabalhistas dos trabalhadores temporários. A responsabilidade solidária é legal — não depende de cláusula contratual.", "B": "Incorreta. A licitude da terceirização não elimina a responsabilidade solidária prevista em lei para o caso específico de falência da ETT.", "C": "Incorreta. A falência não transforma a tomadora em empregadora direta. O que a lei estabelece é responsabilidade solidária, não conversão automática do vínculo.", "D": "Incorreta. A responsabilidade é SOLIDÁRIA (não subsidiária) e decorre da LEI (não de cláusula contratual)."}, fund:"Lei 6.019/74: no caso de falência da empresa de trabalho temporário, a empresa tomadora ou cliente responde solidariamente pelas obrigações trabalhistas devidas ao trabalhador temporário.", caqui:"Diferença importante: no trabalho temporário regido pela Lei 6.019/74, se a ETT FALIR, a tomadora responde SOLIDARIAMENTE. Isso é diferente da terceirização comum, onde a tomadora tem responsabilidade subsidiária. Solidária = ambas devem o total. Subsidiária = primeiro executa a prestadora, depois a tomadora. Na falência da ETT: SOLIDÁRIA, independe de previsão contratual."},
  {num:17, exame:"XXXI Exame — 2020", titulo:"CTPS com Anotação Incorreta — Presunção Relativa e Retificação Judicial", enunciado:"Renato é empregado doméstico e atua como caseiro no sítio de lazer do empregador. Contudo, sua CTPS foi assinada como operador de máquinas da empresa de titularidade do empregador. Renato teme que no futuro não consiga comprovar experiência como doméstico e pretende ajuizar reclamação trabalhista para regularizar a situação.", comando:"Considerando a situação narrada e o entendimento consolidado do TST, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "Caso comprove que, de fato, é doméstico, Renato conseguirá a retificação na CTPS, pois as anotações nela lançadas têm presunção relativa.", "B": "Somente o salário poderia ser objeto de demanda judicial; a alteração da função não é prevista.", "C": "Caso comprove que é doméstico, o pedido será julgado procedente, mas a alteração será feita apenas da sentença em diante.", "D": "Renato não terá sucesso, porque a anotação feita na CTPS tem presunção absoluta."}, fb:{"A": "Correta! A anotação da CTPS tem PRESUNÇÃO RELATIVA (juris tantum) — não absoluta. Portanto, pode ser desconstituída por prova em contrário. Se Renato provar que efetivamente exercia atividade doméstica, o Judiciário pode determinar a retificação da CTPS.", "B": "Incorreta. A reclamação trabalhista pode buscar retificação da CTPS em qualquer dos seus elementos: data de admissão, remuneração, função, modalidade do vínculo. Não existe essa limitação ao salário.", "C": "Incorreta. A retificação deve refletir a realidade do vínculo desde o início — não apenas da sentença para frente.", "D": "Incorreta. Esta é justamente a pegadinha: a presunção é RELATIVA, não absoluta. Presunção absoluta significaria que nenhuma prova poderia afastar o que está na carteira."}, fund:"Entendimento consolidado do TST: as anotações na CTPS têm presunção relativa (juris tantum). Podem ser desconstituídas por prova em contrário. A retificação judicial é possível quando provada a divergência entre o que foi anotado e a realidade do vínculo.", caqui:"CTPS = presunção RELATIVA (não absoluta). Relativa = vale até prova em contrário. A FGV adora essa oposição: presunção absoluta x presunção relativa. Em matéria de CTPS: RELATIVA. O que está na carteira faz prova, mas não prende o juiz — se houver prova em contrário, a realidade prevalece sobre o documento. Frase-macete: 'A carteira prova, mas não prende o juiz: a presunção é relativa.'"},
  {num:18, exame:"XXXI Exame — 2020", titulo:"Cláusula Compromissória de Arbitragem — Requisito Salarial do Art. 507-A CLT", enunciado:"Gervásia é empregada na Lanchonete Pará desde fevereiro de 2018, exercendo a função de atendente e recebendo o valor correspondente a um salário mínimo por mês. O empregador pretende inserir cláusula compromissória de arbitragem no contrato da empregada.", comando:"De acordo com a CLT, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "A inserção não é possível, porque, no Direito do Trabalho, não cabe arbitragem em lides individuais.", "B": "A cláusula compromissória de arbitragem não poderá ser inserida no contrato citado, em razão do salário recebido pela empregada.", "C": "Não há mais óbice à inserção de cláusula compromissória de arbitragem nos contratos de trabalho, inclusive no de Gervásia.", "D": "A cláusula de arbitragem pode ser inserida em todos os contratos de trabalho, sendo admitida de forma expressa ou tácita."}, fb:{"A": "Incorreta. A arbitragem em contratos individuais de trabalho PASSOU a ser admitida pela Reforma Trabalhista (art. 507-A CLT). A alternativa trata como se ainda fosse vedada completamente.", "B": "Correta! Art. 507-A CLT: a cláusula compromissória de arbitragem só pode ser pactuada quando o empregado receber remuneração SUPERIOR A 2 VEZES O TETO DO RGPS. Gervásia recebe apenas 1 salário mínimo — muito abaixo do limite. Logo, não é possível inserir a cláusula.", "C": "Incorreta. A arbitragem não é admitida em TODOS os contratos — apenas para empregados com salário acima do teto. Gervásia não atende o requisito.", "D": "Incorreta. Além de não ser admitida para qualquer salário, a cláusula exige concordância EXPRESSA do empregado — não pode ser tácita."}, fund:"Art. 507-A CLT (Reforma Trabalhista): nos contratos individuais de trabalho cuja remuneração seja superior a duas vezes o limite máximo dos benefícios do RGPS, poderá ser pactuada cláusula compromissória de arbitragem, desde que por iniciativa do empregado ou mediante sua concordância expressa.", caqui:"Arbitragem em DT pós-Reforma: pode — mas tem requisito salarial. Salário > 2x teto do RGPS (em 2025, teto RGPS ≈ R$7.786, então salário > ~R$15.572). Gervásia ganha 1 salário mínimo → muito abaixo → sem arbitragem. Concordância expressa obrigatória (não tácita). Mnemônico: 'Salário baixo = não cabe cláusula compromissória de arbitragem.'"},
  {num:19, exame:"XXIX Exame — 2019", titulo:"Teletrabalho de Rogério — Sem Irregularidade a Requerer", enunciado:"Rogério foi admitido em uma locadora de automóveis como responsável pelo setor de contratos. Não precisava comparecer diariamente à empresa, pois as locações eram feitas on-line. Comparecia uma vez por semana para conferir notas. Trabalhava em sua residência com equipamento fornecido pelo empregador, com contrato prevendo expressamente o teletrabalho. Após um ano, o empregador comunicou o retorno ao presencial por termo aditivo assinado por Rogério, com 30 dias de antecedência.", comando:"Sobre a hipótese de ajuizamento, ou não, da referida ação, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Não se tratando da modalidade de teletrabalho, deverá ser requerida a desconsideração do trabalho em domicílio.", "B": "Não deverá ser requerido o pagamento de horas extras, porém poderá ser requerido trabalho extraordinário em virtude das ausências de intervalo de 11h entre os dias de trabalho.", "C": "Em vista da modalidade de teletrabalho, a narrativa não demonstra qualquer irregularidade a ser requerida em eventual demanda trabalhista.", "D": "Deverá ser requerido que os valores correspondentes aos equipamentos usados para o trabalho em domicílio sejam considerados salário-utilidade."}, fb:{"A": "Incorreta. Trata-se SIM de teletrabalho: contrato expresso, trabalho fora da empresa com tecnologia, comparecimento eventual não descaracteriza.", "B": "Incorreta. O teletrabalhador está excluído do controle de jornada como regra (art. 62, III CLT). Não há fundamento para os pedidos descritos com base nos fatos narrados.", "C": "Correta! Todos os requisitos legais foram observados: contrato expresso prevendo teletrabalho; comparecimento semanal não descaracteriza; retorno ao presencial comunicado por termo aditivo com 30 dias de antecedência (acima do mínimo legal de 15 dias). Sem irregularidade.", "D": "Incorreta. Art. 75-D, parágrafo único CLT: equipamentos fornecidos para o teletrabalho NÃO integram a remuneração. Não são salário-utilidade."}, fund:"Arts. 75-B, 75-C e 75-D CLT: teletrabalho deve constar expressamente do contrato; comparecimento eventual não descaracteriza; retorno ao presencial mediante aviso com prazo mínimo de 15 dias; equipamentos fornecidos não têm natureza salarial.", caqui:"Rogério tinha tudo regularizado: contrato expresso, comparecimento semanal (não descaracteriza), retorno comunicado com 30 dias (acima dos 15 dias mínimos). Resultado: NADA a reclamar. A questão testa se você sabe que no teletrabalho legal não há irregularidade. A armadilha da alternativa D é clássica: equipamento fornecido para trabalho ≠ salário. Não vira salário-utilidade."},
  {num:20, exame:"XXVI Exame — 2018", titulo:"Policial Militar em Emprego Privado — Súmula 386 TST", enunciado:"Paulo é policial militar da ativa da Brigada Militar do RS. Nos dias em que não tem plantão no quartel, atua como segurança em uma joalheria: três dias por semana, não pode se fazer substituir, recebe remuneração fixa mensal, cumpre rotina de 8 horas, recebe ordens do gerente-geral e ajuda nas arrumações de estoque. Paulo não teve a CTPS anotada pela joalheria.", comando:"Diante dessa situação, à luz das normas da CLT e da jurisprudência consolidada do TST, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "Estão preenchidos os requisitos da relação de emprego, razão pela qual Paulo tem vínculo empregatício com a joalheria, independentemente do fato de ser policial militar da ativa, e de sofrer eventual punição disciplinar administrativa prevista no estatuto do Policial Militar.", "B": "Estão preenchidos os requisitos da relação de emprego, mas Paulo não poderá ter vínculo empregatício com a joalheria, em razão da punição disciplinar administrativa prevista no estatuto do Policial Militar.", "C": "Não estão presentes os requisitos da relação de emprego, uma vez que Paulo poderá ser requisitado pela Brigada Militar e não poderá trabalhar nesse dia para a joalheria.", "D": "Estão preenchidos os requisitos da relação de emprego, sendo indiferente à relação de emprego uma eventual punição disciplinar, mas Paulo não pode ter vínculo empregatício tendo em vista que a função pública exige dedicação exclusiva."}, fb:{"A": "Correta! Todos os requisitos do vínculo estão presentes: pessoalidade (não pode substituição), onerosidade (remuneração fixa), não eventualidade (3 dias/semana) e subordinação (ordens do gerente). Súmula 386 TST: policial militar que preenche os requisitos tem vínculo empregatício com o empregador privado — eventual punição disciplinar militar não afasta o vínculo trabalhista.", "B": "Incorreta. A punição disciplinar é na esfera administrativa/militar e não impede o reconhecimento do vínculo de emprego na esfera trabalhista. São esferas autônomas.", "C": "Incorreta. A possibilidade de convocação pela corporação não elimina os requisitos já verificados. O vínculo existe com base na realidade fática.", "D": "Incorreta. Não há regra geral de dedicação exclusiva para policiais militares que impeça o vínculo com empregador privado, conforme a Súmula 386 TST."}, fund:"Arts. 2º e 3º CLT: requisitos da relação de emprego — pessoalidade, onerosidade, não eventualidade, subordinação. Súmula 386 TST: preenchidos os requisitos, existe relação de emprego — eventual punição disciplinar militar não afasta o vínculo empregatício.", caqui:"Súmula 386 TST = policial militar pode ter vínculo empregatício com empresa privada se presentes os requisitos. A punição disciplinar é problema do Paulo na esfera militar — não cancela o contrato de trabalho na esfera cível/trabalhista. As esferas são independentes. Checklist do vínculo: pessoalidade ✓, onerosidade ✓, não eventualidade ✓, subordinação ✓ → vínculo configurado."},
  {num:21, exame:"XXIII Exame — 2017", titulo:"Cláusula Del Credere — Vedada pela Lei de Representação Comercial", enunciado:"Um representante comercial ajuíza ação pedindo a devolução de descontos. Ele explica que sua comissão é de 5%, mas pode optar pelo percentual de 10% se se comprometer a pagar o valor da venda quando o comprador fique inadimplente. Sempre fez a opção pelos 10% e, nos casos de inadimplência, teve de pagar o valor do negócio ao representado para depois tentar reaver do comprador.", comando:"Diante do caso apresentado e da lei de regência, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "A prática é válida porque o representante não é empregado nos moldes da CLT, além de ter sido uma opção por ele tomada.", "B": "O caso traduz um truck system, sendo que a lei limita o prejuízo do representante comercial a 50% da venda não paga.", "C": "A norma de regência é omissa a respeito desta situação, razão pela qual é válida, na medida em que se trata de relação de direito privado.", "D": "A situação caracteriza a cláusula del credere, vedada pela Lei de Representação Comercial."}, fb:{"A": "Incorreta. Ser autônomo não afasta a proteção da lei especial. E o consentimento do representante não convalida cláusula expressamente proibida.", "B": "Incorreta. Não é truck system (que envolve pagamento de salário em mercadorias). E não existe o limite de 50% mencionado.", "C": "Incorreta. A lei de regência não é omissa — o art. 43 da Lei 4.886/65 proíbe expressamente essa transferência de risco ao representante.", "D": "Correta! Art. 43, Lei 4.886/65: é proibida a cláusula del credere — pela qual o representante assume o risco da inadimplência do comprador. Mesmo que o representante 'escolha' receber mais comissão por isso, a cláusula é vedada."}, fund:"Art. 43, Lei 4.886/65 (Lei de Representação Comercial): é vedada qualquer cláusula que imponha ao representante o risco do negócio (cláusula del credere). O risco da inadimplência é do representado, nunca do representante.", caqui:"Cláusula del credere = representante paga se o cliente não pagar. É PROIBIDA pela Lei de Representação Comercial. Não importa que o representante 'escolheu' receber mais comissão em troca — cláusula vedada é cláusula vedada. O consentimento do representante não salva a cláusula. Analogia: é como se uma criança 'escolhesse' trabalhar — a escolha não torna o ato legal. Frase-macete: 'O risco da venda é do representado, nunca do representante.'"},
  {num:22, exame:"XVII Exame — 2015", titulo:"Rescisão Antecipada do Contrato de Experiência — Indenização de 50% do Período Restante", enunciado:"Verônica foi contratada a título de experiência por 30 dias. Após 22 dias de vigência do contrato, o empregador resolveu romper antecipadamente o contrato, que não possuía cláusula assecuratória do direito recíproco de rescisão.", comando:"Sobre o caso, de acordo com a lei de regência, assinale a opção correta.", gabarito:"B", alt:{"A": "O contrato é irregular, pois o contrato de experiência deve ser feito por 90 dias.", "B": "Verônica terá direito à remuneração, e por metade, a que teria direito até o termo do contrato.", "C": "Verônica, como houve ruptura antecipada, terá direito ao aviso prévio e à sua integração ao contrato de trabalho.", "D": "O contrato se transformou em contrato por prazo indeterminado, porque ultrapassou metade da sua vigência."}, fb:{"A": "Incorreta. O contrato de experiência pode ter DURAÇÃO DE ATÉ 90 dias — não precisa ter exatamente 90 dias. 30 dias é válido.", "B": "Correta! Art. 479 CLT: na rescisão antecipada pelo empregador de contrato por prazo determinado SEM cláusula assecuratória do direito recíproco de rescisão, o empregador deve pagar ao empregado METADE DA REMUNERAÇÃO que ele receberia até o fim do contrato. Faltavam 8 dias → Verônica recebe metade de 8 dias.", "C": "Incorreta. Como não há cláusula assecuratória, não há aviso prévio. O art. 479 CLT rege a indenização pela rescisão antecipada nesse caso.", "D": "Incorreta. O contrato não se transforma em prazo indeterminado pelo simples fato de ultrapassar metade da vigência. Esse não é critério legal para a conversão."}, fund:"Art. 479 CLT: nos contratos por prazo determinado, se o empregador rescindir antes do termo, sem cláusula assecuratória do direito recíproco, deve pagar ao empregado metade da remuneração a que teria direito até o fim do contrato. Art. 443, §2º e art. 445, parágrafo único CLT: contrato de experiência = até 90 dias.", caqui:"Rescisão antecipada do contrato de experiência (ou qualquer contrato por prazo determinado) pelo empregador sem cláusula assecuratória = fórmula do art. 479 CLT: METADE do que receberia até o final. Se faltavam 8 dias de salário, Verônica recebe metade de 8 dias. Se houvesse cláusula assecuratória do direito recíproco, aí sim valeria o aviso prévio. Sem a cláusula = só o art. 479."},
  {num:23, exame:"XIV Exame — 2014", titulo:"Contratação Sem Concurso Pela Administração Pública — Súmula 363 TST", enunciado:"O novo prefeito de Tribobó do Oeste decidiu contratar quatro coveiros pelo regime celetista, sem a realização de concurso público. Após um ano de trabalho, foram dispensados e ajuizaram reclamação trabalhista postulando férias vencidas mais 1/3, aviso prévio, 13º salário e depósitos do FGTS, já que sempre receberam os salários em dia.", comando:"Assinale a opção que contempla a(s) verba(s) de direito a que os coveiros efetivamente fazem jus.", gabarito:"C", alt:{"A": "Todas as verbas indicadas, pois decorrem do contrato de trabalho celetista.", "B": "Aviso prévio, 13º salário e FGTS, por terem efetivo cunho rescisório.", "C": "Apenas os depósitos de FGTS.", "D": "Apenas os depósitos de FGTS e férias vencidas mais 1/3, por ter o FGTS natureza salarial e as férias serem direito adquirido pelo ano trabalhado."}, fb:{"A": "Incorreta. O contrato é nulo por violação do art. 37, II CF (exige concurso). A nulidade impede os efeitos típicos do vínculo regular.", "B": "Incorreta. O aviso prévio e o 13º salário não são devidos na contratação nula pela Administração Pública.", "C": "Correta! Súmula 363 TST: o contratado sem concurso pela Administração Pública tem direito apenas à contraprestação pelos serviços prestados (salários — já recebidos no enunciado) e aos DEPÓSITOS DO FGTS. Como os salários já foram pagos, resta apenas o FGTS.", "D": "Incorreta. As férias também não são devidas na contratação nula. E o FGTS não tem natureza salarial."}, fund:"CF art. 37, II e §2º: contratação sem concurso é nula. Súmula 363 TST: o efeito da nulidade do contrato é o pagamento da contraprestação pelos serviços prestados + FGTS. Não são devidos: aviso prévio, férias, 13º salário, verbas rescisórias.", caqui:"Súmula 363 TST = bíblia do concurso sem concurso. Quando a Administração contrata alguém sem concurso, o contrato é NULO — mas o trabalhador não pode ser simplesmente jogado fora sem nada. O que recebe: salários pelos serviços prestados (se já pagos, nada mais a receber) + FGTS. O que NÃO recebe: férias, 13º, aviso prévio, verbas rescisórias. A alternativa D é a pegadinha: inclui as férias e justifica com 'direito adquirido pelo ano trabalhado' — mas a Súmula 363 não prevê isso."},
  {num:24, exame:"XIV Exame — 2014", titulo:"Estágio Desvirtuado em Empresa Pública — Sem Vínculo Por Falta de Concurso", enunciado:"Em 2012, Maria Júlia foi contratada como estagiária de direito em uma empresa pública federal que explora atividade bancária. Sua tarefa consistia em permanecer parte do tempo em um caixa para receber pagamento de contas e, na outra parte, no auxílio de pessoas com dificuldade nos caixas eletrônicos.", comando:"Com base na hipótese, assinale a opção correta.", gabarito:"D", alt:{"A": "Trata-se de estágio desvirtuado que gerará como consequência o reconhecimento do vínculo empregatício com a empresa, com anotação da CTPS e pagamento de todos os direitos devidos.", "B": "O Juiz do Trabalho poderá determinar que o administrador responsável pague diretamente uma indenização a Maria Júlia, haja vista o princípio constitucional da moralidade.", "C": "Não há desvirtuamento de estágio porque, tratando-se de instituição bancária, a atividade de recebimento de contas e auxílio a clientes está inserida na atividade do estagiário.", "D": "Não é possível o reconhecimento do vínculo empregatício, haja vista a natureza jurídica daquele que concedeu o estágio, que exige a prévia aprovação em concurso público."}, fb:{"A": "Incorreta. Há desvirtuamento (atividades de caixa não têm relação com formação jurídica), MAS o vínculo não pode ser reconhecido porque a empresa pública exige concurso.", "B": "Incorreta. Não existe previsão legal para essa responsabilização direta do administrador nos moldes descritos.", "C": "Incorreta. Há sim desvirtuamento — receber pagamentos de contas e auxiliar clientes no caixa eletrônico não guarda relação com a formação em Direito.", "D": "Correta! O estágio está desvirtuado, mas a concedente é empresa pública federal — sujeita ao art. 37, II CF (concurso público obrigatório). Reconhecer vínculo sem concurso seria admitir ingresso indireto no serviço público. TST e STF consolidaram: estágio desvirtuado em empresa pública/administração direta não gera vínculo empregatício."}, fund:"CF art. 37, II: exige concurso público para ingresso na Administração Pública, incluindo empresas públicas. Reconhecer vínculo de emprego em estágio desvirtuado em empresa pública seria burlar o princípio constitucional. A solução é reconhecer o desvirtuamento mas não gerar o vínculo — o estagiário pode buscar indenização por danos.", caqui:"Distinção crucial: estágio desvirtuado em empresa PRIVADA → reconhece vínculo. Estágio desvirtuado em empresa PÚBLICA → NÃO reconhece vínculo (exige concurso). Por quê? Porque reconhecer o vínculo seria dizer que a pessoa foi contratada sem concurso, o que viola o art. 37, II CF. A consequência não é zero — a pessoa pode buscar indenização — mas não é vínculo empregatício formal."},
  {num:25, exame:"VI Exame — 2012 (Reaplicação)", titulo:"Contrato por Prazo Determinado — Intervalo para Nova Contratação e Hipóteses Legais", enunciado:"Com relação ao contrato de emprego, assinale a alternativa correta.", comando:"Assinale a alternativa correta.", gabarito:"A", alt:{"A": "Quando da contratação por prazo determinado, somente é possível nova contratação entre as mesmas partes num prazo nunca inferior a três meses.", "B": "São as formas autorizadas por lei para a celebração de qualquer contrato de trabalho por prazo determinado: transitoriedade do serviço do empregado, transitoriedade da atividade do empregador e quantidade extraordinária de serviço que justifique essa modalidade de contratação.", "C": "Em nenhuma hipótese o contrato por prazo determinado poderá suceder, dentro de seis meses, a outro contrato por prazo determinado.", "D": "O contrato de emprego por prazo indeterminado é aquele em que as partes, ao celebrá-lo, não estipulam a sua duração nem prefixam o seu termo extintivo, podendo versar sobre qualquer obrigação de prestar qualquer tipo de serviço, manual ou intelectual."}, fb:{"A": "Correta conforme gabarito da banca à época. ⚠️ ATENÇÃO: a questão é de 2012 (CESPE). A legislação atual (art. 452 CLT) prevê intervalo de 6 MESES entre contratos por prazo determinado (não 3 meses). Para o Exame 47, memorize: 6 MESES é o intervalo atual.", "B": "Incorreta. As hipóteses legais do art. 443, §2º CLT são: (1) serviço de natureza transitória; (2) atividade empresarial de caráter transitório; (3) contrato de experiência. A alternativa trocou 'contrato de experiência' por 'quantidade extraordinária de serviço' — hipótese que não existe na CLT.", "C": "Incorreta. Existem exceções à vedação de successão: quando a expiração do contrato dependeu da execução de serviços especializados ou da realização de certos acontecimentos.", "D": "Incorreta. O contrato de emprego não pode versar sobre 'qualquer obrigação' — exige os requisitos dos arts. 2º e 3º da CLT (pessoalidade, onerosidade, não eventualidade, subordinação)."}, fund:"Art. 452 CLT (redação atual): não se considera por prazo determinado o contrato que suceder, dentro de 6 meses, a outro contrato por prazo determinado entre as mesmas partes, salvo exceções legais. Art. 443, §2º CLT: hipóteses de contrato a termo — serviço transitório, atividade empresarial transitória e contrato de experiência.", caqui:"⚠️ ATENÇÃO AO PRAZO: a questão é de 2012 e usava redação da época. Hoje o art. 452 CLT prevê 6 MESES de intervalo. Para o Exame 47, grave: 6 MESES. As três hipóteses do art. 443 §2º CLT: (1) serviço transitório; (2) atividade empresarial transitória; (3) contrato de experiência. Não existe 'quantidade extraordinária de serviço' como hipótese legal."},
  {num:26, exame:"IX Exame — 2012", titulo:"Experiência Prévia Exigida na Admissão — Limite de 6 Meses (Art. 442-A CLT)", enunciado:"Buscando profissionais experientes para manusear equipamentos de alta tecnologia e custo extremamente elevado, uma empresa anuncia a existência de vagas para candidatos que possuam dois anos de experiência prévia em determinada atividade.", comando:"A partir da hipótese apresentada, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "A manifestação é inválida porque o máximo de experiência que pode ser exigida é de seis meses.", "B": "A manifestação é inválida, pois o empregador não tem o direito de exigir experiência pretérita do candidato a emprego.", "C": "A manifestação é inválida porque o máximo de experiência que pode ser exigida é de um ano.", "D": "A manifestação é válida, em razão do valor do equipamento, visando à proteção do patrimônio do empregador."}, fb:{"A": "Correta! Art. 442-A CLT: o empregador não poderá exigir do candidato comprovação de experiência prévia por tempo superior a 6 MESES no mesmo tipo de atividade. Dois anos ultrapassa esse limite → exigência ilegal.", "B": "Incorreta. O empregador PODE exigir experiência prévia — apenas não pode pedir mais de 6 meses. A vedação é ao excesso, não à exigência em si.", "C": "Incorreta. O limite não é 1 ano — é 6 MESES. A banca tentou te fazer confundir com o prazo do contrato de experiência.", "D": "Incorreta. O valor do equipamento não afasta a aplicação do art. 442-A CLT. A lei não cria exceções por valor patrimonial."}, fund:"Art. 442-A CLT: para fins de contratação, o empregador não poderá exigir do candidato a emprego comprovação de experiência prévia por tempo superior a 6 meses no mesmo tipo de atividade.", caqui:"Art. 442-A CLT = experiência prévia máxima de 6 MESES. Pode exigir experiência? Sim. Mas nunca por mais de 6 meses. O valor do equipamento, a complexidade da função, o tamanho da empresa — nada disso cria exceção. A FGV adora esse número: 6 meses! Não confundir com o contrato de experiência que também tem 90 dias/3 meses como máximo — são institutos diferentes."},
  {num:27, exame:"V Exame — 2011", titulo:"Exigência de 11 Meses de Experiência — Ilegal pelo Art. 442-A CLT", enunciado:"Uma empresa põe anúncio em jornal oferecendo emprego para a função de vendedor, exigindo que o candidato tenha experiência anterior de 11 meses nessa função.", comando:"Diante disso, assinale a alternativa correta.", gabarito:"D", alt:{"A": "A exigência é legal, pois a experiência até 1 ano pode ser exigida do candidato a qualquer emprego, estando inserida no poder diretivo do futuro empregador.", "B": "A exigência não traduz discriminação no emprego, de modo que poderia ser exigido qualquer período de experiência anterior.", "C": "A exigência é ilegal, pois o máximo que o futuro empregador poderia exigir seriam 3 meses de experiência.", "D": "A exigência é ilegal, pois o máximo que o futuro empregador poderia exigir seriam 6 meses de experiência."}, fb:{"A": "Incorreta. Não é legal exigir 11 meses — ultrapassa o limite de 6 meses do art. 442-A CLT.", "B": "Incorreta. Não pode exigir qualquer período. O limite é 6 meses.", "C": "Incorreta. O limite não é 3 meses — é 6 meses. A alternativa confundiu com outro prazo trabalhista.", "D": "Correta! Art. 442-A CLT: máximo de experiência prévia exigível = 6 MESES. 11 meses > 6 meses → exigência ilegal."}, fund:"Art. 442-A CLT: o empregador não poderá exigir do candidato comprovação de experiência prévia por tempo superior a 6 meses no mesmo tipo de atividade.", caqui:"Mesma regra da Q26: art. 442-A CLT = 6 MESES de experiência prévia é o máximo. 11 meses = ilegal. A alternativa C foi colocada para quem confunde com o prazo do contrato de experiência (90 dias = 3 meses). São institutos diferentes: EXPERIÊNCIA PRÉVIA EXIGIDA NA ADMISSÃO (máx. 6 meses) ≠ CONTRATO DE EXPERIÊNCIA (máx. 90 dias)."},
  {num:28, exame:"II Exame — 2010", titulo:"Poder Disciplinar — Bis in Idem Vicia a Justa Causa", enunciado:"O empregado João foi contratado como caixa de supermercado. No ato de admissão, foi-lhe entregue regulamento da empresa com obrigatoriedade do uso de uniforme. Após cinco meses, compareceu sem uniforme → recebeu advertência. Um mês depois, repetiu → suspensão de 3 dias. Mais 2 meses, compareceu sem uniforme → suspensão de 30 dias. Ao retornar da suspensão, foi dispensado por justa causa (indisciplina — art. 482, h, CLT).", comando:"Diante deste caso concreto", gabarito:"D", alt:{"A": "Está correta a aplicação da justa causa, uma vez que João descumpriu reiteradamente as ordens genéricas do empregador contidas no regulamento geral.", "B": "Está incorreta a aplicação da justa causa, uma vez que João cometeu ato de insubordinação e não de indisciplina.", "C": "Está incorreta a aplicação da justa causa, uma vez que João cometeu mau procedimento.", "D": "Está incorreta a aplicação da justa causa, uma vez que o empregador praticou bis in idem, ao punir João duas vezes pelo mesmo fato."}, fb:{"A": "Incorreta. Embora João tenha praticado indisciplina, a justa causa é viciada pelo bis in idem — o empregador puniu a mesma falta duas vezes.", "B": "Incorreta. O caso é de INDISCIPLINA (descumprimento de norma geral do regulamento), não insubordinação (que seria descumprimento de ordem direta e pessoal). A análise do enquadramento até está certa, mas o motivo da incorreção é o bis in idem.", "C": "Incorreta. Mau procedimento é conduta desonrosa do empregado no trabalho — não se confunde com descumprimento de norma do regulamento.", "D": "Correta! Após aplicar a suspensão de 30 dias pelo terceiro episódio, o empregador esgotou seu poder disciplinar em relação ÀQUELA FALTA. Dispensar por justa causa com base na mesma conduta que já foi punida com suspensão = BIS IN IDEM = punir duas vezes pelo mesmo ato. Vedado no DT."}, fund:"Bis in idem no direito do trabalho: uma falta = uma punição. O empregador não pode aplicar duas sanções pela mesma infração. Art. 482, h CLT: indisciplina = descumprimento de norma geral. Insubordinação = descumprimento de ordem pessoal e direta.", caqui:"Dois aprendizados nessa questão: (1) INDISCIPLINA x INSUBORDINAÇÃO: indisciplina = norma geral (regulamento). Insubordinação = ordem direta do chefe. (2) BIS IN IDEM: 'uma falta, uma punição'. O empregador puniu com suspensão de 30 dias a terceira falta do João → depois o dispensou por justa causa pela MESMA falta. Proibido. A sequência correta seria: advertência → suspensão → JUSTA CAUSA (cada uma para uma falta diferente)."},
  {num:29, exame:"II Exame — 2010", titulo:"Teoria das Nulidades — Trabalho Proibido Gera Efeitos; CTPS Não Invalida Contrato", enunciado:"No contexto da teoria das nulidades do contrato de trabalho, assinale a alternativa correta.", comando:"Assinale a alternativa correta.", gabarito:"B", alt:{"A": "Configurado o trabalho ilícito, é devido ao empregado somente o pagamento da contraprestação salarial pactuada.", "B": "Os trabalhos noturno, perigoso e insalubre do menor de 18 (dezoito) anos de idade são modalidades de trabalho proibido ou irregular.", "C": "O trabalho do menor de 16 (dezasseis) anos de idade, que não seja aprendiz, é modalidade de trabalho ilícito, não gerando qualquer efeito.", "D": "A falta de anotação da Carteira de Trabalho e Previdência Social do empregado invalida o contrato de trabalho."}, fb:{"A": "Incorreta. No trabalho ilícito (objeto criminoso), em regra o contrato não produz efeitos trabalhistas — não é correto dizer que o empregado tem direito 'apenas ao salário pactuado'.", "B": "Correta! Trabalho noturno, perigoso e insalubre de menor de 18 anos é PROIBIDO/IRREGULAR — não ilícito. O objeto em si (trabalho) é lícito, mas há violação de norma protetora. O contrato produz efeitos para proteger o trabalhador.", "C": "Incorreta. Trabalho de menor de 16 anos (fora da aprendizagem) é PROIBIDO, não ilícito. A distinção é fundamental: trabalho proibido gera efeitos (para proteger o menor); trabalho ilícito, em regra, não gera efeitos.", "D": "Incorreta. A falta de anotação da CTPS NÃO invalida o contrato de trabalho. O vínculo existe pela realidade fática — a CTPS é um documento probatório, não constitutivo do contrato."}, fund:"Teoria das nulidades no DT: trabalho ILÍCITO = objeto criminoso = regra: sem efeitos. Trabalho PROIBIDO = atividade lícita em desacordo com norma protetora = produz efeitos (para proteger quem trabalhou). Art. 29 CLT: ausência de anotação da CTPS não invalida o contrato — o vínculo é fático.", caqui:"Distinção que a FGV adora: ILÍCITO = o próprio objeto é crime (ex.: trabalhar para tráfico). PROIBIDO/IRREGULAR = atividade lícita, mas vedada para aquela pessoa (ex.: menor trabalhando à noite). Ilícito → regra: sem efeitos. Proibido → gera efeitos (para proteger o trabalhador vulnerável). CTPS sem assinatura = vínculo existe do mesmo jeito — o contrato de trabalho é informal por natureza e pode ser provado por qualquer meio."},
  {num:30, exame:"I CESPE — 2009", titulo:"Contrato de Experiência — Prorrogação Única e Prazo Máximo de 90 Dias", enunciado:"Assinale a opção correta de acordo com o contrato individual de trabalho regido pela CLT.", comando:"Assinale a opção correta.", gabarito:"D", alt:{"A": "O referido contrato somente poderá ser acordado de forma expressa.", "B": "É exigida forma especial para a validade e eficácia do contrato em apreço, motivo pelo qual não é permitida a forma verbal.", "C": "Um contrato de trabalho por prazo determinado de dois anos poderá ser prorrogado uma única vez, por igual período.", "D": "No contrato mencionado, o contrato de experiência poderá ser prorrogado uma única vez, porém não poderá exceder o prazo de noventa dias."}, fb:{"A": "Incorreta. O contrato de trabalho pode ser celebrado EXPRESSA OU TACITAMENTE — é o que prevê o art. 443 CLT.", "B": "Incorreta. O contrato de trabalho não exige forma especial. Pode ser verbal, escrito ou tácito — é consensual e informal.", "C": "Incorreta. O contrato por prazo determinado tem duração máxima de 2 anos — não pode ser prorrogado 'por igual período' (o que chegaria a 4 anos). Só uma prorrogação, dentro do limite de 2 anos no total.", "D": "Correta! Art. 445, parágrafo único CLT: o contrato de experiência pode ser PRORROGADO UMA ÚNICA VEZ — mas não pode exceder o total de 90 dias (contando o período original mais a prorrogação)."}, fund:"Art. 443 CLT: contrato de trabalho pode ser expresso ou tácito, verbal ou escrito. Art. 445, parágrafo único CLT: o contrato de experiência tem prazo máximo de 90 dias, admitindo uma única prorrogação dentro desse limite.", caqui:"Contrato de experiência: máximo 90 dias, podendo ser em dois períodos (ex.: 45+45, 60+30, 30+60). UMA ÚNICA prorrogação. Se fizer segunda prorrogação ou ultrapassar 90 dias → vira contrato por prazo indeterminado. O contrato de trabalho em geral é INFORMAL — pode ser verbal, tácito ou escrito. Não exige forma especial."},
  {num:31, exame:"I CESPE — 2008 (OAB-SP)", titulo:"Aposentadoria Espontânea — Não Extingue o Contrato de Trabalho", enunciado:"Com relação ao entendimento jurisprudencial dominante sobre a aposentadoria espontânea do empregado, assinale a opção correta.", comando:"Assinale a opção correta.", gabarito:"D", alt:{"A": "A aposentadoria espontânea extingue o contrato de trabalho, desobrigando para sempre o empregador do pagamento da multa de 40% sobre os depósitos do FGTS do período anterior à aposentadoria.", "B": "A aposentadoria voluntária extingue o contrato de trabalho, ainda que o empregado continue a trabalhar na empresa após a concessão do benefício previdenciário.", "C": "A aposentadoria espontânea extingue o contrato de trabalho, salvo se o empregado voltar a trabalhar em outra empresa.", "D": "A concessão da aposentadoria voluntária ao trabalhador não extingue, instantânea e automaticamente, o vínculo de emprego, não ficando o empregador desonerado de indenizar o empregado, arbitrariamente despedido, da multa de 40% sobre depósitos de FGTS anteriores à aposentadoria."}, fb:{"A": "Incorreta. A aposentadoria espontânea NÃO extingue o contrato (entendimento do STF). Se depois vier demissão sem justa causa, a multa de 40% é devida sobre TODO o FGTS, inclusive o anterior à aposentadoria.", "B": "Incorreta. O vínculo de emprego continua após a aposentadoria se o empregado segue trabalhando. O STF declarou inconstitucionais os dispositivos que extinguiam o contrato pela aposentadoria.", "C": "Incorreta. A aposentadoria não extingue o contrato em nenhum cenário — seja permanecendo na mesma empresa ou não.", "D": "Correta! Entendimento do STF (ADI 1.721): a aposentadoria voluntária NÃO extingue automaticamente o contrato de trabalho. Se o empregado continua trabalhando e depois é dispensado sem justa causa, a multa de 40% do FGTS incide sobre todos os depósitos, inclusive os anteriores à aposentadoria."}, fund:"STF ADI 1.721: inconstitucionalidade dos §§1º e 2º do art. 453 CLT (que previam extinção do contrato pela aposentadoria). Consolidado: aposentadoria espontânea ≠ extinção do contrato. Demissão posterior sem justa causa = multa de 40% FGTS sobre todo o período.", caqui:"'Aposentou = acabou o contrato' → ERRADO (entendimento do STF). O empregado pode aposentar e continuar trabalhando para o mesmo empregador normalmente. O contrato só acaba se houver rescisão. Se vier demissão sem justa causa depois da aposentadoria, o trabalhador leva a multa de 40% do FGTS sobre TODO o período, inclusive o de antes da aposentadoria. Frase-macete: 'Aposentou ≠ acabou o contrato.'"},
  {num:32, exame:"I CESPE — 2008", titulo:"Hipóteses de Contrato por Prazo Determinado — Empreitada Não É Hipótese Legal", enunciado:"Não é cabível contrato de trabalho por prazo determinado em", comando:"Assinale a opção correta.", gabarito:"C", alt:{"A": "serviço cuja natureza ou transitoriedade justifique a predeterminação do prazo.", "B": "atividades empresariais de caráter transitório.", "C": "contrato de empreitada.", "D": "contrato de experiência."}, fb:{"A": "Incorreta (esta É hipótese legal). Art. 443, §2º, a CLT: serviço cuja natureza ou transitoriedade justifique a predeterminação do prazo = hipótese válida de contrato a termo.", "B": "Incorreta (esta também É hipótese legal). Art. 443, §2º, b CLT: atividades empresariais de caráter transitório = hipótese válida.", "C": "Correta! O contrato de empreitada NÃO é hipótese de contrato de trabalho por prazo determinado prevista no art. 443, §2º CLT. É contrato civil (Código Civil), não trabalhista.", "D": "Incorreta (esta É hipótese legal). Art. 443, §2º, c e art. 445, parágrafo único CLT: contrato de experiência = modalidade clássica de contrato a termo."}, fund:"Art. 443, §2º CLT: hipóteses de contrato por prazo determinado: (a) serviço transitório; (b) atividade empresarial transitória; (c) contrato de experiência. Empreitada = contrato civil (arts. 610-626 CC) — não integra o rol trabalhista.", caqui:"As três hipóteses do art. 443 §2º CLT: (1) serviço transitório; (2) atividade empresarial transitória; (3) contrato de experiência. Empreitada NÃO está no rol. É contrato civil — o empreiteiro não é empregado (em regra). A questão pergunta o que NÃO é hipótese, então a resposta é o que não está na lista: empreitada."},
];
let cur=0,N=QUESTOES.length;
const E=Array(N).fill(null);
function init(){
  const nw=document.getElementById('nw'),ct=document.getElementById('ct');
  QUESTOES.forEach((q,i)=>{
    const b=document.createElement('button');
    b.className='nb'+(i===0?' active':'');b.textContent=i+1;b.onclick=()=>go(i);b.id='n'+i;nw.appendChild(b);
    const d=document.createElement('div');d.className='qc'+(i===0?' vis':'');d.id='c'+i;d.innerHTML=bc(q,i);ct.appendChild(d);
  });upd();us();
}
function bc(q,i){
  const al=Object.entries(q.alt).map(([l,t])=>`<button class="ab" onclick="resp(${i},'${l}',this)" data-l="${l}"><span class="all">${l}</span><span class="alt">${t}</span></button>`).join('');
  return `<div class="qh"><span class="qn">Questão ${q.num}</span>${q.exame?`<span class="qe">${q.exame}</span>`:''}</div><h2 class="qt">${q.titulo}</h2><div class="en">${q.enunciado}</div><p class="co">${q.comando}</p><div class="al" id="a${i}">${al}</div><div class="fb" id="f${i}"></div><div class="fu" id="u${i}"><h4>📖 Fundamento legal</h4>${q.fund}</div><div class="cx" id="x${i}"><h4>🍊 Explicação do Prof. Caqui</h4>${q.caqui}</div><div class="ca"><div class="bg"><button class="btn az" id="bu${i}" onclick="tF(${i})">Ver fundamento legal</button><button class="btn cq" id="bx${i}" onclick="tX(${i})">Explicação do Prof. Caqui</button><button class="btn" id="br${i}" onclick="rst(${i})">↺ Tentar novamente</button></div><span class="st" id="s${i}"></span></div>`;
}
function resp(i,l,btn){
  if(E[i]!==null)return;E[i]=l;const q=QUESTOES[i];
  document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=true;if(b.dataset.l===q.gabarito)b.classList.add('cor');if(b.dataset.l===l&&l!==q.gabarito)b.classList.add('err');});
  const ok=l===q.gabarito,f=document.getElementById('f'+i);
  f.className='fb sh '+(ok?'ac':'er');f.innerHTML=`<strong>${ok?'✓ Correta!':'✗ Incorreta.'}</strong> ${q.fb[l]}`;
  document.getElementById('s'+i).textContent=ok?'Acerto!':'Gabarito: '+q.gabarito;
  document.getElementById('br'+i).className='btn sh';document.getElementById('bu'+i).className='btn az sh';document.getElementById('bx'+i).className='btn cq sh';
  const nb=document.getElementById('n'+i);nb.classList.remove('active');nb.classList.add(ok?'ok':'no');if(i===cur)nb.classList.add('active');us();
}
function tF(i){const b=document.getElementById('u'+i),t=document.getElementById('bu'+i),v=b.classList.contains('sh');b.className=v?'fu':'fu sh';t.textContent=v?'Ver fundamento legal':'Ocultar fundamento';}
function tX(i){const b=document.getElementById('x'+i),t=document.getElementById('bx'+i),v=b.classList.contains('sh');b.className=v?'cx':'cx sh';t.textContent=v?'Explicação do Prof. Caqui':'Ocultar explicação';}
function rst(i){
  E[i]=null;document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=false;b.className='ab';});
  document.getElementById('f'+i).className='fb';document.getElementById('u'+i).className='fu';
  document.getElementById('bu'+i).className='btn az';document.getElementById('bu'+i).textContent='Ver fundamento legal';
  document.getElementById('x'+i).className='cx';document.getElementById('bx'+i).className='btn cq';document.getElementById('bx'+i).textContent='Explicação do Prof. Caqui';
  document.getElementById('br'+i).className='btn';document.getElementById('s'+i).textContent='';
  document.getElementById('n'+i).className='nb'+(i===cur?' active':'');us();
}
function go(i){document.getElementById('c'+cur).classList.remove('vis');document.getElementById('n'+cur).classList.remove('active');cur=i;document.getElementById('c'+cur).classList.add('vis');document.getElementById('n'+cur).classList.add('active');upd();window.scrollTo({top:0,behavior:'smooth'});}
function nav(d){const n=cur+d;if(n>=0&&n<N)go(n);}
function upd(){document.getElementById('pi').textContent=(cur+1)+' de '+N;document.getElementById('bp').disabled=cur===0;document.getElementById('bn').disabled=cur===N-1;}
function us(){const r=E.filter(e=>e!==null).length,a=E.filter((e,i)=>e===QUESTOES[i].gabarito).length;document.getElementById('sc-t').textContent=r;document.getElementById('sc-a').textContent=a;document.getElementById('sc-e').textContent=r-a;const p=Math.round((r/N)*100);document.getElementById('pf').style.width=p+'%';document.getElementById('pl').textContent=r+' de '+N+' respondidas';}
init();
</script>
